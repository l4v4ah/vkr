version: "3.9"

# Local development environment for the monitoring system.
# Start everything with: docker compose up -d
# Tear down:            docker compose down -v

networks:
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  nats_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       monitoring
      POSTGRES_USER:     monitoring
      POSTGRES_PASSWORD: monitoring
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [monitoring]

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data"]  # enable JetStream with persistence
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring HTTP
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [monitoring]

  # ── Microservices ────────────────────────────────────────────────────────────

  collector:
    build:
      context: ..
      dockerfile: Dockerfile.collector
    restart: unless-stopped
    environment:
      HTTP_ADDR:    ":8080"
      NATS_URL:     "nats://nats:4222"
      LOG_LEVEL:    "info"
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monitoring]

  aggregator:
    build:
      context: ..
      dockerfile: Dockerfile.aggregator
    restart: unless-stopped
    environment:
      NATS_URL:     "nats://nats:4222"
      POSTGRES_URL: "postgres://monitoring:monitoring@postgres:5432/monitoring?sslmode=disable"
      LOG_LEVEL:    "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [monitoring]

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      HTTP_ADDR:    ":8081"
      POSTGRES_URL: "postgres://monitoring:monitoring@postgres:5432/monitoring?sslmode=disable"
      LOG_LEVEL:    "info"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monitoring]

