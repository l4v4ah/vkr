name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout=5m

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -count=1 -race -timeout=60s ./cmd/...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests (Testcontainers)
        run: go test -count=1 -race -timeout=120s -tags=integration ./internal/storage/...

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.collector
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build aggregator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aggregator
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
